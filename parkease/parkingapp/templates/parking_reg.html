{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block navs %}{% endblock %}
{% block content %}
    <div  class="card bg-secondary bg-opacity-25 text-black border-secondary shadow mx-auto"
  style="max-width: 600px">
        <div class="card-body">
            <div>
                <h2 class="text-center fw-bold">Parking Registration</h2>
            </div>
        <form method="POST">
            {% csrf_token %}
            {{ form |crispy}}

            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="{% url 'parking_list' %}" class="btn btn-danger">Cancel</a>
        </form>
        </div>
    </div>
{% endblock %}
